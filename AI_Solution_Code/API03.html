<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Azure AI Translator Demo</title>
    <style>
        body {
            font-family: Arial, "Microsoft JhengHei", sans-serif;
            margin: 30px;
        }

        textarea {
            width: 100%;
            height: 120px;
            font-size: 16px;
        }

        select, button, input {
            font-size: 16px;
            padding: 6px;
            margin: 5px 0;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            background-color: #f7f7f7;
            min-height: 80px;
        }
    </style>
</head>
<body>

    <h2>Azure AI Translator Demo</h2>

    <label>API Key：</label><br>
    <input type="password" id="apiKey" style="width:100%;" placeholder="請輸入 Azure Translator Key"
    value="3qKCKudlKkDaAdZPxtTrGY94JaQknXm7eNu1fWnZ84LORgxvitOdJQQJ99CFACYeBjFXJ3w3AAAbACOG2d2n"
    ><br><br>

    <label>Region：</label><br>
    <input type="text" id="region" style="width:100%;" placeholder="例如：eastasia" value="eastus"><br><br>

    <label>來源語言：</label><br>
    <select id="fromLang">
        <option value="zh-Hant">中文</option>
        <option value="en">英文</option>
        <option value="ja">日文</option>
        <option value="de">德文</option>
        <option value="fr">法文</option>
    </select>

    <br><br>

    <label>目的語言：</label><br>
    <select id="toLang">
        <option value="en">英文</option>
        <option value="zh-Hant">中文</option>
        <option value="ja">日文</option>
        <option value="de">德文</option>
        <option value="fr">法文</option>
    </select>

    <br><br>

    <label>輸入文字：</label><br>
    <textarea id="inputText" placeholder="請輸入要翻譯的文字"></textarea>

    <br><br>

    <button onclick="translateText()">翻譯</button>

    <h3>翻譯結果：</h3>
    <div id="result"></div>

    <script>
        async function translateText() {
            const key = document.getElementById("apiKey").value;
            const region = document.getElementById("region").value;
            const fromLang = document.getElementById("fromLang").value;
            const toLang = document.getElementById("toLang").value;
            const text = document.getElementById("inputText").value;
            const resultDiv = document.getElementById("result");

            if (!key || !region || !text) {
                resultDiv.innerText = "請輸入 API Key、Region 與要翻譯的文字。";
                return;
            }

            const endpoint = "https://api.cognitive.microsofttranslator.com/";
            const url = endpoint +
                "translate?api-version=3.0" +
                "&from=" + fromLang +
                "&to=" + toLang;

            const body = [
                {
                    Text: text
                }
            ];

            try {
                resultDiv.innerText = "翻譯中...";

                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Ocp-Apim-Subscription-Key": key,
                        "Ocp-Apim-Subscription-Region": region,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(body)
                });

                const data = await response.json();

                if (!response.ok) {
                    resultDiv.innerText = "發生錯誤：\n" + JSON.stringify(data, null, 2);
                    return;
                }

                const translatedText = data[0].translations[0].text;
                resultDiv.innerText = translatedText;

            } catch (error) {
                resultDiv.innerText = "呼叫 API 失敗：\n" + error;
            }
        }
    </script>

</body>
</html>
